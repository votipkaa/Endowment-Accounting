# Alembic Configuration

[alembic]
# path to migration scripts
script_location = migrations

# template used to generate migration file names
file_template = %%(rev)s_%%(slug)s

# sys.path path, will be prepended to sys.path if present
# defaults to the current directory
prepend_sys_path = .

# timezone to use when rendering the date
# within the migration file as well as the filename.
# string value is passed to zoneinfo.ZoneInfo()
# leave blank for localtime
# timezone =

# max length of characters to apply to the
# "slug" field when generating a new migration
# (affects length of filenames, as well as the id
# string inside the migration file).
# When the length is trimmed, the original unicode
# trailing characters are silently dropped and not reproduced
# for the id and filename.
truncate_slug_length = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow .pyc and .pyo files without
# a source .py file to be detected as revisions in the
# versions/ directory
# sourceless = false

# logging configuration
# Loggers to configure with handlers and formatters
# Keys are names of loggers in the namespaces that
# SQLAlchemy / Alembic send log output. A value of
# DEBUG logs the SQL emitted; INFO logs just toplevel
# flow; WARN logs warn messages; ERROR logs error messages.
# see SQLAlchemy docs for the full set of what's available
# under the 'sqlalchemy.engine' namespace, when to use is
# discussed in PythonLogging.rst
sqlalchemy.url = driver://user:pass@localhost/dbname

[loggers]
keys = sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
